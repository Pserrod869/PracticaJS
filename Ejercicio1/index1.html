<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Juego de Adivinar</title>
    <style>
        
    </style>
</head>

<body>
    <div class="container">
        <div class="game">
            <h3>Adivina el número entre 0-10</h3>
            <input type="number" id="data" class="data" placeholder="Ingresa un número" />
            <button id="validate">Validar</button>
            <h4 class="warning" id="warning">El juego ha comenzado</h4>
            <h4 id="pts-label">0</h4>
        </div>
    </div>

    <div id="modal">
        <div id="win">
            <img src="trophy.png" id="logo" alt="trophy" />
            <h3>FELICIDADES HAS GANADO</h3>
            <p id="pts"></p>
            <a href="index.html" id="btn-close" class="btnClose">Cerrar</a>
        </div>
    </div>

    <script src="script1.js"></script>
</body>

</html>
